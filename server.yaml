listen: :443

tls:
  cert: /etc/letsencrypt/live/your.vps.domain/fullchain.pem # change the domain
  key: /etc/letsencrypt/live/your.vps.domain/privkey.pem # change the domain

auth:
  type: password
  password: your_auth_password # change this

obfs:
  type: salamander 
  salamander:
    password: your_obfs_password # change this

masquerade:
  type: proxy
  proxy:
    url: https://www.real.site/ # change this
    rewriteHost: true

resolver:
  type: udp
  udp:
    addr: 8.8.4.4:53
    timeout: 4s
